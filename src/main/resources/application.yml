server:
  port: 8080

spring:
  application:
    name: portfolio-tracker

  datasource:
    url: jdbc:mysql://localhost:3306/portfolio_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: harshita@2005
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' is convenient for a portfolio/learning project.
      # In a real production system this would be replaced by versioned
      # migrations (Flyway/Liquibase) with ddl-auto: validate.
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

app:
  jwt:
    # In production this MUST come from an environment variable / secrets manager,
    # never committed to source control.
    secret: ${JWT_SECRET:this-is-a-dev-only-secret-key-change-me-please-32bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  market:
    # Number of days of mock price history generated the first time a symbol is seen.
    price-history-days: 90

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: ERROR
    com.portfoliotracker: DEBUG
